name: Build Release

"on":
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"
  ASSET_BASENAME: "order-organizer-assistant"

jobs:
  test:
    name: TypeScript Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Python runner dependencies
        run: python -m pip install -r requirements-python-runner.txt

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Python runner dependencies
        run: python -m pip install -r requirements-python-runner.txt

      - name: Build Python rules runner
        shell: pwsh
        run: ./scripts/build-python-runner-win.ps1

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET_BASENAME }}-windows.exe
          path: release/${{ env.ASSET_BASENAME }}-windows.exe
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ASSET_BASENAME }}-windows.exe
          path: release-assets

      - name: Publish direct download release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="build-${GITHUB_RUN_NUMBER}"
          gh release create "$tag" \
            "release-assets/${{ env.ASSET_BASENAME }}-windows.exe#${{ env.ASSET_BASENAME }}-windows.exe" \
            --title "订单整理助手 ${tag}" \
            --notes "Windows: download ${{ env.ASSET_BASENAME }}-windows.exe and double-click to install." \
            --target "$GITHUB_SHA" \
            --latest
