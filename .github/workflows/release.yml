name: Build Release

"on":
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"
  ASSET_BASENAME: "orderflow-desktop"

jobs:
  test:
    name: TypeScript Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-python-runner.txt

      - name: Install dependencies
        run: npm ci

      - name: Install Python runner dependencies
        run: python -m pip install -r requirements-python-runner.txt

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build-windows:
    name: Build Windows Portable EXE
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-python-runner.txt

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Cache Python rules runner
        id: cache-python-runner
        uses: actions/cache@v4
        with:
          path: python-helper
          key: ${{ runner.os }}-python-runner-${{ hashFiles('requirements-python-runner.txt', 'python_extraction_bridge.py', 'desktop_runner.py', 'extract.py', 'rules/**', 'scripts/build-python-runner-win.ps1') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Python runner dependencies
        if: steps.cache-python-runner.outputs.cache-hit != 'true'
        run: python -m pip install -r requirements-python-runner.txt

      - name: Build Python rules runner
        if: steps.cache-python-runner.outputs.cache-hit != 'true'
        shell: pwsh
        run: ./scripts/build-python-runner-win.ps1

      - name: Write release build info
        shell: pwsh
        run: |
          Set-Content -Path src/core/buildInfo.ts -Value 'export const CURRENT_RELEASE_TAG = "build-${{ github.run_number }}";'

      - name: Build Windows portable exe
        run: npm run dist:win:ci

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET_BASENAME }}-windows.exe
          path: release/${{ env.ASSET_BASENAME }}-windows.exe
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - test
      - build-windows
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ASSET_BASENAME }}-windows.exe
          path: release-assets

      - name: Publish direct download release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="build-${GITHUB_RUN_NUMBER}"
          gh release create "$tag" \
            "release-assets/${{ env.ASSET_BASENAME }}-windows.exe#${{ env.ASSET_BASENAME }}-windows.exe" \
            --title "订单整理助手 ${tag}" \
            --notes "Windows 便携版已自动生成。直接下载 orderflow-desktop-windows.exe，双击即可打开软件，无需安装。" \
            --target "$GITHUB_SHA" \
            --latest
